ServerTokens Prod
ServerSignature Off
TraceEnable Off

Timeout 30
KeepAlive Off
MaxRequestWorkers 256
ServerLimit 256
StartServers 16
MinSpareServers 8
MaxSpareServers 32

<Directory /var/www/html>
    Options -Indexes -Includes -ExecCGI -FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

<FilesMatch "\.(?:bak|c|conf|db|inc|ini|phar|sh|so|sql|sqlite|swp|tar|zip)$">
    Require all denied
</FilesMatch>

<LocationMatch "^/(?:cgi-bin|icons)(?:/|$)">
    Require all denied
</LocationMatch>
